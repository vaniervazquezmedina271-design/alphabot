name: Sistema 2 — Alertas horarias

# ============================================================
#  Alertas en tiempo real + revisión de Telegram.
#  Corre cada hora, 24/7.
#  En cada ejecución:
#    1. Revisa Telegram (comandos, lenguaje natural, audios)
#    2. Busca noticias nuevas, analiza solo las no vistas (cache)
#    3. Envía alertas de alto impacto a Telegram
# ============================================================

on:
  schedule:
    # Cada 5 minutos, 24/7 (mínimo práctico de GitHub Actions). Máximo tiempo real
    # en la nube. Requiere repositorio PÚBLICO (minutos ilimitados); en repo
    # privado gastaría ~8.600 min/mes y superaría el tope gratis de 2.000.
    # VARIANTES (cambia el número tras la barra):
    #   '*/5  * * * *'  -> cada 5 min   << ACTUAL (repo público)
    #   '*/10 * * * *'  -> cada 10 min  (~4.300 min/mes)
    #   '*/15 * * * *'  -> cada 15 min  (~2.880 min/mes)
    #   '*/30 * * * *'  -> cada 30 min  (~1.440 min/mes, cabe en gratis privado)
    #   '0 * * * *'     -> cada hora    (~720 min/mes, el original)
    # NOTA: aunque GitHub sea gratis, el LLM tiene su propio rate limit; el cache
    # de 48h, el análisis por lotes y el failover lo mantienen bajo control.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  breaking-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # necesario para commitear watchlist/config

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚨 Ejecutar alertas + revisar Telegram
        run: python run_report.py --breaking --no-reasoning
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
