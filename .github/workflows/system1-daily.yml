name: Sistema 1 — Reporte diario

# ============================================================
#  Reporte diario de calendario macro.
#  Solo corre entre 7-8 AM hora de Nueva York (guard de ventana en Python).
#  GitHub Actions cron va en UTC:
#    - 11 UTC = 7 AM EDT (horario de verano)
#    - 12 UTC = 7 AM EST (horario de invierno)
#
#  FIABILIDAD: GitHub retrasa o SALTA los crons "a la hora en punto" (minuto 0),
#  sobre todo en horas de mucha carga. Para no perder el reporte, disparamos a
#  MINUTOS DESFASADOS y VARIAS VECES dentro de la ventana (minutos 15, 35 y 55
#  de las horas 11 y 12 UTC). El guard "reporte diario ya enviado hoy" del
#  estado compartido (data/state/daily_report.json) garantiza que, aunque
#  dispare varias veces, el reporte salga UNA sola vez al día.
# ============================================================

on:
  schedule:
    - cron: '15,35,55 11 * * *'   # 7 AM EDT (verano), 3 intentos desfasados
    - cron: '15,35,55 12 * * *'   # 7 AM EST (invierno), 3 intentos desfasados
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # necesario para commitear watchlist/config

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 Ejecutar reporte diario + revisar Telegram
        run: python run_report.py --daily --no-reasoning
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
