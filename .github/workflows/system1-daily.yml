name: Sistema 1 — Reporte diario

# ============================================================
#  Reporte diario de calendario macro.
#  Corre por la mañana hora de Nueva York (guard de ventana 6-11 AM NY en Python).
#  GitHub Actions cron va en UTC:
#    - 11-14 UTC ≈ 7-10 AM EDT (horario de verano)
#    - (en invierno esa franja UTC cae 6-9 AM EST, también dentro de la ventana)
#
#  FIABILIDAD: GitHub retrasa o SALTA los crons con frecuencia (a veces HORAS).
#  Con la ventana estrecha anterior (7-8 AM) los runs retrasados llegaban fuera
#  de ventana y el reporte NO salía (fallaba mañanas seguidas). Ahora disparamos
#  CADA 20 MINUTOS durante toda la franja de la mañana (11:00-14:59 UTC) para
#  tolerar retrasos/saltos de GitHub, y el guard "reporte diario ya enviado hoy"
#  (data/state/daily_report.json) garantiza que salga UNA sola vez al día.
# ============================================================

on:
  schedule:
    - cron: '*/20 11-14 * * *'   # cada 20 min, 11:00-14:59 UTC (~7-10:59 AM ET)
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # necesario para commitear watchlist/config

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 Ejecutar reporte diario + revisar Telegram
        run: python run_report.py --daily --no-reasoning
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
