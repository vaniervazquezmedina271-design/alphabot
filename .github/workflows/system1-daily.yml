name: Sistema 1 — Reporte diario

# ============================================================
#  Reporte diario de calendario macro.
#  Solo corre entre 7-8 AM hora de Nueva York (guard en Python).
#  GitHub Actions cron va en UTC:
#    - 11 UTC = 7 AM EDT (horario de verano)
#    - 12 UTC = 7 AM EST (horario de invierno)
#  Ejecutamos ambos crons; el guard en run_report.py deja pasar
#  solo si NY está entre 7:00 y 8:59 AM.
# ============================================================

on:
  schedule:
    - cron: '0 11 * * *'   # 7 AM EDT (verano)
    - cron: '0 12 * * *'   # 7 AM EST (invierno)
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # necesario para commitear watchlist/config

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 Ejecutar reporte diario + revisar Telegram
        run: python run_report.py --daily --no-reasoning
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
